apiVersion: v1
kind: Secret
metadata:
  name: omni-query-secrets
  namespace: omni-query
type: Opaque
stringData:
  GEMINI_API_KEY: {{ .Values.secrets.geminiApiKey | quote }}
  QDRANT_API_KEY: {{ .Values.secrets.qdrantApiKey | quote }}
  QDRANT_URL: {{ .Values.secrets.qdrantUrl | quote }}
  LANGFUSE_PUBLIC_KEY: {{ .Values.secrets.langfusePublicKey | quote }}
  LANGFUSE_SECRET_KEY: {{ .Values.secrets.langfuseSecretKey | quote }}
