apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: omni-query-api-hpa
  namespace: omni-query
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: omni-query-api
  minReplicas: {{ .Values.hpa.api.minReplicas }}
  maxReplicas: {{ .Values.hpa.api.maxReplicas }}
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ .Values.hpa.api.targetCPUUtilizationPercentage }}
